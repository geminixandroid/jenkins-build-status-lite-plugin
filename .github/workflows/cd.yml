name: CD

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build HPI
        run: |
          VERSION="${{ github.ref_name }}"
          mvn package -DskipTests -Dchangelist="${VERSION#v}"

      - name: Rename HPI with version
        run: mv target/build-status-lite.hpi target/build-status-lite-${{ github.ref_name }}.hpi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: target/build-status-lite-${{ github.ref_name }}.hpi
          generate_release_notes: true
